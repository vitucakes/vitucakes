name: Update competencia

on:
  schedule:
    # Lunes 23:30 ART = Martes 02:30 UTC (corre 30 min después que precios para
    # no pisarse y reusar el commit del bot)
    - cron: '30 2 * * 2'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run scrape
        run: node scripts/update-competencia.mjs
      - name: Commit if changed
        run: |
          if [[ -n $(git status -s public/competencia.json) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/competencia.json
            git commit -m "Update competencia (auto)"
            git push
          else
            echo "Sin cambios en competencia.json"
          fi
