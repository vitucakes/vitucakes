name: Update precios sugeridos

on:
  schedule:
    # Lunes 23:00 ART = Martes 02:00 UTC
    - cron: '0 2 * * 2'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run scrape
        run: node scripts/update-prices.mjs
      - name: Commit if changed
        run: |
          if [[ -n $(git status -s public/precios_sugeridos.json) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/precios_sugeridos.json
            git commit -m "Update precios sugeridos (auto)"
            git push
          else
            echo "Sin cambios en precios_sugeridos.json"
          fi
