name: Update precios Día

on:
  schedule:
    # Lunes 23:15 ART = Martes 02:15 UTC (15 min después de El Granate)
    - cron: '15 2 * * 2'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run scrape
        run: node scripts/update-precios-dia.mjs
      - name: Commit if changed
        run: |
          if [[ -n $(git status -s public/precios_dia.json) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/precios_dia.json
            git commit -m "Update precios Día (auto)"
            git push
          else
            echo "Sin cambios en precios_dia.json"
          fi
